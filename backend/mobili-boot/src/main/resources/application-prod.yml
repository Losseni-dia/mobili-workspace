# Production : pas de fuite SQL dans les logs, schéma contrôlé par Flyway uniquement.
spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    com.mobili.backend: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never # Sécurité : ne pas exposer les détails de la DB en public

mobili:
  security:
    refresh:
      secure: ${JWT_COOKIE_SECURE:true} # true en prod HTTPS, false en local HTTP
  cors:
    allowed-origins:
      - http://localhost
      - http://localhost:81
      - http://127.0.0.1
      - http://127.0.0.1:81
      - https://mobili.ci
      - https://www.mobili.ci