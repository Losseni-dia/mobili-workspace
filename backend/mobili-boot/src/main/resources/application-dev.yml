# Développement local : schéma tolérant, SQL visible, CORS localhost.
#
# Métriques pour Grafana/Prometheus (docker compose --profile metrics) :
#   http://localhost:8080/actuator/prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.mobili.backend: DEBUG
    org.hibernate.SQL: DEBUG

mobili:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://127.0.0.1:4200
      # Projet « mobili-business » (ng serve --project mobili-business)
      - http://localhost:4201
      - http://127.0.0.1:4201
