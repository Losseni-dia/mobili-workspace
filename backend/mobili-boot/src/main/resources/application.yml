# ---------------------------------------------------------------------------
# Configuration globale Mobili
# ---------------------------------------------------------------------------
server:
  port: 8080
  servlet:
    context-path: /v1

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 70MB
  
  # Configuration Datasource (Les identifiants sont injectés via docker.env)
  datasource:
    driver-class-name: org.postgresql.Driver
    # Note : Spring injecte automatiquement SPRING_DATASOURCE_URL/USERNAME/PASSWORD
  
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # Sécurité en prod : ne modifie pas le schéma
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        

  data:
    redis:
      # Injecté via SPRING_DATA_REDIS_HOST dans docker.env
      repositories:
        enabled: false
  
  jackson:
    time-zone: UTC
# ---------------------------------------------------------------------------
# Configuration spécifique Mobili
# ---------------------------------------------------------------------------
mobili:
  # Ajout des ports pour le Frontend User (4200/80) et Business (4201/81)
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:4201
      - http://localhost
      - http://localhost:81
      - http://127.0.0.1:4200
      - http://127.0.0.1:4201
      - http://127.0.0.1
      - http://127.0.0.1:81

  ui:
    # Désactivation des messages de succès (ex: "connexion réussie")
    show-success-messages: ${APP_SHOW_SUCCESS_MESSAGES:false}

  security:
    rate-limit:
      enabled: true
      login-refresh-per-minute: 25
      register-mutations-per-minute: 10
      gare-preview-per-minute: 60
      payment-webhook-per-minute: 120
      # Toggle Redis pour le Rate Limit si le profil redis-rate-limit est actif
      redis:
        enabled: ${REDIS_RATE_LIMIT_ENABLED:false}
        key-prefix: mobili:rl
        allow-on-redis-failure: true

    jwt:
      secret-key: ${JWT_SECRET}
      
    refresh:
      cookie-name: MOBILI_REFRESH
      max-age-seconds: 604800
      path: /v1
      secure: ${JWT_COOKIE_SECURE:false} # true en prod via docker.env
      same-site: Lax

  backend:
    upload:
      # Dossier racine (mappé en /app/uploads dans Docker)
      root-directory: ${BACKEND_UPLOAD_DIR:uploads}
      users: users
      partners: partners
      vehicles: vehicles
      documents-folder: documents
      max-bytes-per-file: 12582912
      max-bytes-per-document: 5242880

# ---------------------------------------------------------------------------
# Services Externes
# ---------------------------------------------------------------------------
fedapay:
  secret:
    key: ${FEDAPAY_SECRET_KEY}
  webhook:
    secret: ${FEDAPAY_WEBHOOK_SECRET}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO