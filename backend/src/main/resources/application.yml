# ---------------------------------------------------------------------------
# Configuration commune (tous les profils). Les surcharges : application-{profile}.yml
# Profil actif : SPRING_PROFILES_ACTIVE (dev | acc | prod), défaut = dev en local.
# ---------------------------------------------------------------------------
server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  devtools:
    restart:
      enabled: false
  datasource:
    # En local, souvent seul DB_PASSWORD. Défauts dev = postgres / base mobili_db (Docker : variables du compose priment).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mobili_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    open-in-view: false

logging:
  level:
    org.springframework.boot.devtools: warn

mobili:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://127.0.0.1:4200
  security:
    jwt:
      secret-key: ${JWT_SECRET}
  backend:
    upload:
      root-directory: uploads
      users: users
      partners: partners
      vehicles: vehicles

fedapay:
  secret:
    key: ${FEDAPAY_SECRET_KEY}
  webhook:
    secret: ${FEDAPAY_WEBHOOK_SECRET}
