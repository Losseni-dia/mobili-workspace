server {
    listen 81; # Indispensable pour éviter le conflit avec le Front User
    server_name localhost;

    absolute_redirect off;
    root /usr/share/nginx/html;

    location ^~ /v1/ {
        # 'backend' devient 'localhost' car ils partagent le même réseau Task
        proxy_pass http://localhost:8080/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /uploads/ {
        proxy_pass http://localhost:8080/v1/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mobili-workspace/ {
        try_files $uri $uri/ /mobili-workspace/index.html;
    }

    location = / {
        return 302 /mobili-workspace/;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}