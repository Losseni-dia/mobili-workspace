name: Cd Pipeline Mobili
on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v4 est la version stable actuelle
      
      - name: setup node js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm' # Active le cache AUTOMATIQUEMENT
          cache-dependency-path: frontend/package-lock.json # Indique où est ton fichier

      - name: 📦 Install npm dependencies
        run: |
          cd frontend
          npm ci # Utilise 'ci' pour les pipelines, c'est plus rapide

      - name: Run tests
        run: |
          cd frontend
          npm test -- --watch=false

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup node js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install npm dependencies
        run: |
          cd frontend
          npm ci

      - name: Build application
        run: |
          cd frontend
          npm run build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: frontend/dist # Assure-toi que c'est le bon chemin vers tes fichiers buildés

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: frontend/dist
      - name: Deploy to server
        run: echo "Déploiement de l'application sur le serveur de production OK"
