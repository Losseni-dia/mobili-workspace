name: Cd Pipeline Mobili
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 👋 Clone Repository ubuntu vm
        uses:
          actions/checkout@v6
          # run: |
          #     echo clone du repo
          #     echo "${{toJson(github)}}"
          #     git clone https://github.com/${{github.repository}}.git MesFichiers
          #     cd MesFichiers && ls
      - name: setup node js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Cache dependencies
        uses: actions/cache@v5
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
            linux-node-2123534
      - name: 📦 Install npm dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npm install
      - name: Run tests
        run: |
          cd frontend
          npm test -- --watch=false
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 👋 Clone Repository ubuntu vm
        uses: actions/checkout@v6
        # run: |
        #     echo clone du repo
        #     echo "${{toJson(github)}}"
        #     git clone https://github.com/${{github.repository}}.git MesFichiers
        #     cd MesFichiers && ls
      - name: setup node js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Cache dependencies
        uses: actions/cache@v5
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
            linux-node-2123534
      - name: 📦 Install npm dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npm install
      - name: Build application
        run: |
          cd frontend
          npm run build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        run: echo "Déploiement de l'application sur le serveur de production OK"
