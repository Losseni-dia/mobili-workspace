apiVersion: 1

datasources:
  - name: Mobili PostgreSQL
    uid: mobili-postgres
    type: postgres
    access: proxy
    url: '${GRAFANA_POSTGRES_URL}'
    database: '${GRAFANA_POSTGRES_DB}'
    user: '${GRAFANA_POSTGRES_USER}'
    secureJsonData:
      password: '${GRAFANA_POSTGRES_PASSWORD}'
    jsonData:
      sslmode: disable
      timescaledb: false
